services:
  backend:
    build:
      context: ./backend
    ports:
      - "9000:9000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file:
      - ./backend/.env
    depends_on:
      - postgres

  admin:
    build:
      context: ./admin-panel
    ports:
      - "7001:7001"
    environment:
      - VITE_MEDUSA_BACKEND_URL=http://localhost:9000
    volumes:
      - ./admin-panel:/app
      - /app/node_modules
    depends_on:
      - backend

  vendor:
    build:
      context: ./vendor-panel
    ports:
      - "7002:7002"
    environment:
      - VITE_MEDUSA_BACKEND_URL=http://localhost:9000
      - VITE_MEDUSA_BASE=/
    volumes:
      - ./vendor-panel:/app
      - /app/node_modules
    depends_on:
      - backend

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: medusajs
      POSTGRES_DB: medusa
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data:
